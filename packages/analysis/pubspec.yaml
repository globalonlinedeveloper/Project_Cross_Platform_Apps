name: nikatru_lints
description: >-
  Shared analyzer settings + lint rules for all Nikatru packages and apps.
  Consumers depend on this package and include
  package:nikatru_lints/analysis_options.yaml.
version: 0.1.0
publish_to: none
repository: https://github.com/globalonlinedeveloper/Project_Cross_Platform_Apps

environment:
  sdk: ^3.9.0

resolution: workspace

dependencies:
  # Ships the base rule set our analysis_options.yaml includes. A regular
  # dependency (not dev) so consumers resolve flutter.yaml transitively.
  flutter_lints: ^6.0.0
