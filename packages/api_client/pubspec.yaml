name: nikatru_api_client
description: >-
  Generic, auth-agnostic HTTP client for NIKATRU app backends (Cloudflare
  Workers). Wraps Dio behind the RestClient seam; callers inject a base URL and
  a token provider — no auth SDK, no app-config, no app domain models.
version: 0.1.0
publish_to: none
resolution: workspace
repository: https://github.com/globalonlinedeveloper/Project_Cross_Platform_Apps

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  dio: ^5.4.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
