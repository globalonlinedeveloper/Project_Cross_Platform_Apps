name: nikatru_design_system
description: >-
  Shared design system for NIKATRU apps — colour/text/spacing tokens, a
  ThemeExtension carrying the brand tokens that don't fit ColorScheme, a
  buildAppTheme({seed, brightness}) factory, and a hand-rolled adaptive
  AppScaffold (NavigationBar → NavigationRail → NavigationDrawer).
version: 0.1.0
publish_to: none
repository: https://github.com/globalonlinedeveloper/Project_Cross_Platform_Apps

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
