name: nikatru_notifications
description: >-
  Concrete, plugin-backed implementation of the NIKATRU core NotificationService
  seam (local streak / daily-goal reminders) via flutter_local_notifications +
  timezone. Web has no plugin support so callers get a NoOpNotificationService;
  Windows can show immediately but cannot repeat-schedule (2026 platform audit).
  Keeps packages/core pure Dart — one shared dependency for the brick app
  (CFG G-25 / ADR 005 seam pattern, mirroring nikatru_platform_storage).
version: 0.1.0
publish_to: none
resolution: workspace
repository: https://github.com/globalonlinedeveloper/Project_Cross_Platform_Apps

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  nikatru_core:
    path: ../core
  # Local notifications (show + daily zonedSchedule) on Android/iOS/macOS/Linux.
  # No web support (callers fall back to NoOp) and no repeat-schedule on Windows.
  # Pinned to 17.x to share ONE workspace resolution with apps/subly (its
  # existing renewal-reminder service targets the 17.x API); the concrete
  # zonedSchedule call below matches that major.
  flutter_local_notifications: ^17.2.0
  # Timezone-correct scheduling for zonedSchedule (pure Dart, all platforms).
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
