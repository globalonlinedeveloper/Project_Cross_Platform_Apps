name: Deploy Web

# Builds Subly web with the real Flutter SDK on GitHub's runners, then
# uploads the built site to the EXISTING Cloudflare Pages project "subly"
# via wrangler (Direct Upload) — so subly.nikatru.com stays put.

on:
  push:
    branches: [main]
    paths:
      - 'apps/subly/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Build & deploy Subly web to Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/subly
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.7

      - run: flutter pub get

      - name: Build web (release, no service worker)
        run: >
          flutter build web --release --pwa-strategy=none
          --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      - name: Deploy to Cloudflare Pages (project subly)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/subly
          command: pages deploy build/web --project-name=subly --branch=main
