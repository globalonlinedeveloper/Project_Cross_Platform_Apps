name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    name: Flutter analyze (app)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/subly
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  backend:
    name: Worker typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx tsc --noEmit

  tokens:
    name: Design tokens (build + drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tokens
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Committed token outputs must equal a fresh build
        run: git diff --exit-code -- build

  telemetry:
    name: Telemetry (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/telemetry
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  site_shared:
    name: Shared site build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites/_shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build

  design_system:
    name: Design system (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/design_system
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  core:
    name: Core (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  api_client:
    name: API client (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api_client
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart pub get
      - run: dart analyze
      - run: dart test

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs: [flutter, backend, tokens, telemetry, site_shared, core, api_client, design_system]
    if: always()
    steps:
      - name: Require all lanes green
        run: |
          echo "flutter=${{ needs.flutter.result }} backend=${{ needs.backend.result }} tokens=${{ needs.tokens.result }} telemetry=${{ needs.telemetry.result }} site_shared=${{ needs.site_shared.result }}"
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::One or more CI lanes failed"; exit 1
          fi
          echo "All lanes green"
