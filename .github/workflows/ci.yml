name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# NOTE (2026-07-22): the Dart/Flutter per-package lanes (flutter/app, core, api_client,
# design_system, telemetry) were RETIRED — `workspace_gate` runs `melos run analyze` +
# `melos run test` across every Dart workspace member in ONE resolution, which fully
# covers them (analyze = dart analyze per member, infos non-fatal; test = dart test for
# pure-Dart members + flutter test for Flutter members). The lanes below are the ones
# workspace_gate does NOT cover: the TS Workers, the Node token/site builds, and the
# brick-stamp validation.

jobs:
  subly_api:
    name: subly-api Worker (typecheck + dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/subly-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx tsc --noEmit
      - run: npx wrangler deploy --dry-run

  platform:
    name: platform Worker (typecheck + test + dry-run)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npx tsc --noEmit
      - run: npm test
      - run: npx wrangler deploy --dry-run

  tokens:
    name: Design tokens (build + drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tokens
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: Committed token outputs must equal a fresh build
        run: git diff --exit-code -- build

  site_shared:
    name: Shared site build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites/_shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build

  app_brick:
    name: App brick (stamp probe + analyze app + validate service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install mason_cli
        run: dart pub global activate mason_cli
      # Root-oriented stamp: emits apps/probe/ + services/probe-api/ and appends
      # probe to sites/_shared/_data/apps.json (post_gen / SHOW-1).
      - name: Stamp a throwaway app + service from the brick
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          mason get
          mason make app -c tooling/bricks/app/_probe_vars.json -o . --on-conflict overwrite
      - name: SHOW-1 — post_gen appended probe to apps.json (then revert)
        run: |
          grep -q '"slug": "probe"' sites/_shared/_data/apps.json
          git checkout -- sites/_shared/_data/apps.json
      - name: Analyze + test the stamped app
        working-directory: apps/probe
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos
          flutter test
      - name: Typecheck + dry-run the stamped service
        working-directory: services/probe-api
        run: |
          npm install
          npx tsc --noEmit
          npx wrangler deploy --dry-run

  workspace_gate:
    name: Workspace gate (melos analyze + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.7
      - name: Activate melos
        run: dart pub global activate melos 8.2.2
      # Flutter members require the Flutter tool for root workspace resolution
      # (plain `dart pub get` cannot resolve `sdk: flutter` dependencies).
      - name: Resolve the workspace
        run: flutter pub get
      - name: melos run analyze
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          melos run analyze
      - name: melos run test
        run: |
          export PATH="$PATH:$HOME/.pub-cache/bin"
          melos run test

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    needs: [subly_api, platform, tokens, site_shared, app_brick, workspace_gate]
    if: always()
    steps:
      - name: Require all lanes green
        run: |
          echo "subly_api=${{ needs.subly_api.result }} platform=${{ needs.platform.result }} tokens=${{ needs.tokens.result }} site_shared=${{ needs.site_shared.result }} app_brick=${{ needs.app_brick.result }} workspace_gate=${{ needs.workspace_gate.result }}"
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "::error::One or more CI lanes failed"; exit 1
          fi
          echo "All lanes green"
