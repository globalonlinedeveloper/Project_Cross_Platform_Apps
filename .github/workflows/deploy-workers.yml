name: Deploy Workers

# Deploys the Cloudflare Workers in services/ on push to main. Path-scoped so a
# change to one service never redeploys the other (mirrors deploy-web.yml's
# scoping for the Flutter web app). Uses the SAME scoped Cloudflare credentials
# as deploy-web.yml — CLOUDFLARE_API_TOKEN must include **Workers Scripts: Edit**
# (the token in cowork-private/secrets.env already deploys these Workers).
#
# Manual run: Actions ▸ Deploy Workers ▸ "Run workflow" (workflow_dispatch)
# redeploys BOTH Workers from current main — a manual redeploy / rollback button.

on:
  push:
    branches: [main]
    paths:
      - 'services/subly-api/**'
      - 'services/platform/**'
      - '.github/workflows/deploy-workers.yml'
  workflow_dispatch:

concurrency:
  group: deploy-workers
  cancel-in-progress: false

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      subly_api: ${{ steps.decide.outputs.subly_api }}
      platform: ${{ steps.decide.outputs.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            subly_api:
              - 'services/subly-api/**'
            platform:
              - 'services/platform/**'
      - id: decide
        # Manual dispatch has no diff to filter on → deploy both. Push → per-path.
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "subly_api=true"  >> "$GITHUB_OUTPUT"
            echo "platform=true"   >> "$GITHUB_OUTPUT"
          else
            echo "subly_api=${{ steps.filter.outputs.subly_api }}" >> "$GITHUB_OUTPUT"
            echo "platform=${{ steps.filter.outputs.platform }}"   >> "$GITHUB_OUTPUT"
          fi

  subly-api:
    name: Deploy subly-api
    needs: detect
    if: needs.detect.outputs.subly_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
        working-directory: services/subly-api
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/subly-api
          command: deploy

  platform:
    name: Deploy platform
    needs: detect
    if: needs.detect.outputs.platform == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install
        working-directory: services/platform
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: services/platform
          command: deploy
