name: {{app_id.snakeCase()}}
description: "{{display_name}} — a NIKATRU Cross Platform App."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Shared spine (path deps — apps/<id> sits two levels above packages/).
  nikatru_core:
    path: ../../packages/core
  nikatru_api_client:
    path: ../../packages/api_client
  nikatru_design_system:
    path: ../../packages/design_system
  nikatru_telemetry:
    path: ../../packages/telemetry
  nikatru_platform_storage:
    path: ../../packages/platform_storage

  # State (Riverpod 2.x-LTS, non-codegen — locked chassis choice) + routing.
  flutter_riverpod: ^2.5.0
  go_router: ^14.2.0

  # Launch external URLs (support mailto, legal links) — all 6 platforms.
  url_launcher: ^6.3.0

  # HTTP for the CFG-1 runtime-config transport (matches the shared spine client).
  dio: ^5.4.0

  # Running app version — drives the CFG-1 force-update kill-switch.
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
